# SolverForge — Autostart applications

# Waybar (restart on sway reload)
exec_always pgrep -x waybar && { pkill -x waybar; pkill -x waybar --wait; }; sleep 1; waybar


# Logitech device manager (tray hidden)
exec_always solaar -w hide

# Screen annotation overlay daemon
exec_always wayscriber --daemon

# Autotiling daemon (dwindle-style split direction)
exec_always pkill -x solverforge-autotile; sleep 0.2; solverforge-autotile

# Idle manager: SolverForge screensaver + lock flow
exec_always pkill -x swayidle; sleep 0.2; solverforge-swayidle
