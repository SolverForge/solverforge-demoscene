# SolverForge — Sway window rules

# Floating terminal windows launched via solverforge scripts
for_window [app_id="sway-float"] floating enable, resize set 1024 800
for_window [app_id="sway-float-wide"] floating enable, resize set 1600 800

# SolverForge phosphor screensaver
for_window [title="SOLVERFORGE // SCREENSAVER_03"] border none, fullscreen enable
